<!-- Modern Admin Login Page -->
<div class="login-page">
  <!-- Animated Background -->
  <div class="background-container">
    <!-- Gradient Overlay -->
    <div class="gradient-overlay"></div>

    <!-- Floating Particles -->
    <div class="particles">
      <div class="particle" *ngFor="let particle of [1,2,3,4,5,6,7,8]"></div>
    </div>

    <!-- Brand Watermark -->
    <div class="brand-watermark">
      <span class="watermark-text">Thunder</span>
    </div>
  </div>
  
  <!-- Login Container -->
  <div class="login-container">
    <!-- Login Card -->
    <div class="login-card">
      <!-- Card Header -->
      <div class="card-header">
        <!-- Brand Logo -->
        <div class="brand-section">
          <div class="logo-container">
            <div class="logo-icon">
              <img src="../../../../assets/i18n/thunder.png" alt="Logo" height="40">
            </div>
            <div class="brand-info">
              <h1 class="brand-name">Thunder</h1>
              <p class="brand-tagline">Admin Portal</p>
            </div>
          </div>
        </div>

        <!-- Welcome Message -->
        <div class="welcome-section">
          <h2 class="welcome-title">Welcome Back!</h2>
          <p class="welcome-subtitle">Sign in to access your admin dashboard</p>
        </div>
      </div>
      <!-- Card Content -->
      <div class="card-content">

        <!-- ── ÉTAPE 1 : Formulaire de connexion ───────────────────────────── -->
        <form class="login-form" *ngIf="step === 1" (ngSubmit)="onSubmit()">
          <!-- Email/Username Field -->
          <div class="form-group">
            <label class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              Email ou nom d'utilisateur
            </label>
            <div class="input-container">
              <input
                type="text"
                class="form-input"
                [(ngModel)]="usernameOrEmail"
                name="usernameOrEmail"
                placeholder="Entrez votre email"
                required
                [disabled]="isdisabled">
              <div class="input-border"></div>
            </div>
            <div *ngIf="usernameOrEmailError" class="error-message">
              <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
              {{ usernameOrEmailError }}
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <circle cx="12" cy="16" r="1"/>
                <path d="m7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              Mot de passe
            </label>
            <div class="input-container">
              <input
                [type]="hidePassword ? 'password' : 'text'"
                class="form-input password-input"
                [(ngModel)]="password"
                name="password"
                placeholder="Entrez votre mot de passe"
                required
                [disabled]="isdisabled">
              <button type="button" class="password-toggle" (click)="hidePassword = !hidePassword">
                <svg *ngIf="!hidePassword" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="m1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg *ngIf="hidePassword" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="m1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                  <path d="m9 9 6 6"/><path d="M15 9 9 15"/>
                </svg>
              </button>
              <div class="input-border"></div>
            </div>
            <div *ngIf="passwordError" class="error-message">
              <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
              {{ passwordError }}
            </div>
          </div>

          <div class="warnmessage" *ngIf="errornum > 0 && errornum < 3">
            <p id="warnmess">Il vous reste {{ 3 - errornum }} tentative(s)</p>
          </div>
          <div class="banmess" *ngIf="errornum >= 3">
            <p>Vous êtes bloqué pour 24h</p>
          </div>

          <!-- Login Button -->
          <button type="submit" class="login-button" [disabled]="isdisabled">
            <span class="button-content">
              <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
              </svg>
              <span class="button-text">Se connecter</span>
            </span>
            <div class="button-glow"></div>
          </button>
        </form>

        <!-- ── ÉTAPE 2 : Vérification OTP ──────────────────────────────────── -->
        <div class="otp-form" *ngIf="step === 2">
          <!-- Icône email -->
          <div class="otp-icon-wrapper">
            <div class="otp-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
              </svg>
            </div>
          </div>

          <p class="otp-description">
            Un code à <strong>6 chiffres</strong> a été envoyé à<br>
            <span class="otp-email">{{ usernameOrEmail }}</span>
          </p>

          <!-- Champ OTP -->
          <div class="form-group">
            <label class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
              Code de vérification
            </label>
            <div class="input-container">
              <input
                type="text"
                class="form-input otp-input"
                [(ngModel)]="otp"
                name="otp"
                placeholder="· · · · · ·"
                maxlength="6"
                inputmode="numeric"
                autocomplete="one-time-code"
                (keyup.enter)="verifyOtp()">
              <div class="input-border"></div>
            </div>
            <div *ngIf="otpError" class="error-message">
              <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
              {{ otpError }}
            </div>
          </div>

          <!-- Bouton vérifier -->
          <button type="button" class="login-button" (click)="verifyOtp()" [disabled]="otpLoading">
            <span class="button-content">
              <svg *ngIf="!otpLoading" class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <ion-spinner *ngIf="otpLoading" name="crescent" class="btn-spinner"></ion-spinner>
              <span class="button-text">{{ otpLoading ? 'Vérification...' : 'Valider le code' }}</span>
            </span>
            <div class="button-glow"></div>
          </button>

          <!-- Liens secondaires -->
          <div class="otp-actions">
            <button type="button" class="otp-link" (click)="resendOtp()" [disabled]="resendLoading">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              {{ resendLoading ? 'Envoi...' : 'Renvoyer le code' }}
            </button>
            <button type="button" class="otp-link otp-link--back" (click)="backToLogin()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
              </svg>
              Retour à la connexion
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
