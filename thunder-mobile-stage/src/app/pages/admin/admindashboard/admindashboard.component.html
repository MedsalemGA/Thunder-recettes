<!-- Admin Layout Container -->
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" [class.sidebar-open]="isSidebarOpen">
    <!-- Brand Section -->
    <div class="brand-section">
      <div class="brand-content">
        <img src="../../../../assets/i18n/thunder.png" style="width: 30px; height: 30px;">
        <h1 class="brand-title" [class.visible]="isSidebarOpen">Thunder</h1>
        <p class="brand-tagline" [class.visible]="isSidebarOpen" style="font-size: 20px;">Admin Dashboard</p>
      </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <!-- Dashboard -->
      <a (click)="navigateTo('dashboard')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2V9a2 2 0 00-2-2h-2a2 2 0 00-2 2v10"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Dashboard</span>
      </a>

      <!-- Companies -->
      <a (click)="navigateTo('entreprises')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Companies</span>
      </a>

      <!-- Influencers -->
      <a (click)="navigateTo('influenceurs')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Influencers</span>
      </a>

      <!-- Messaging -->
      <a (click)="navigateTo('messaging')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Messaging</span>
      </a>

      <!-- Offers -->
      <a (click)="navigateTo('offres')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Offers</span>
      </a>

      <!-- Postulations -->
      <a (click)="navigateTo('postulations')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2l4-4m1-5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2z" />
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Postulations</span>
      </a>

      <!-- Configuration -->
      <a (click)="navigateTo('configuration')" class="nav-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Configuration</span>
      </a>
    </nav>

    <!-- User Section -->
    <div class="user-section">
      <!-- Admin Info -->
      <div class="admin-info">
        <div class="admin-status">
          <span class="status-indicator"></span>
        </div>
        <div class="admin-details" [class.visible]="isSidebarOpen">
          <span class="admin-name">{{ adminName }}</span>
          <span class="admin-role">Administrator</span>
        </div>
      </div>

      <!-- Logout -->
      <a (click)="logout()" class="nav-item logout-item">
        <div class="nav-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </div>
        <span class="nav-text" [class.visible]="isSidebarOpen">Logout</span>
      </a>
    </div>
  </aside>
  <!-- Mobile Menu Toggle -->
  <button class="mobile-menu-toggle" (click)="toggleSidebar()">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
  </button>

  <!-- Main Content Area -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay" [class.active]="isSidebarOpen" (click)="toggleSidebar()"></div>
</div>
